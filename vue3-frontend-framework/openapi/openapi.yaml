openapi: 3.0.3
info:
  title: Vue3前端框架API规范
  description: 基于Vue3 + Vue Router + Pinia + Element-UI的前端应用API接口规范
  version: 1.0.0
  contact:
    name: API支持团队
    email: support@example.com

servers:
  - url: http://localhost:3000/api
    description: 本地开发服务器
  - url: https://api.example.com
    description: 生产环境服务器

tags:
  - name: 认证
    description: 用户认证相关接口
  - name: 用户管理
    description: 用户信息管理接口
  - name: 系统配置
    description: 系统配置相关接口

paths:
  /auth/login:
    post:
      tags:
        - 认证
      summary: 用户登录
      description: 用户通过用户名和密码进行登录认证
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: 认证失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/register:
    post:
      tags:
        - 认证
      summary: 用户注册
      description: 新用户注册账号
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegisterResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 用户已存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      tags:
        - 认证
      summary: 用户登出
      description: 退出当前登录状态
      operationId: logout
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 登出成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      tags:
        - 认证
      summary: 刷新令牌
      description: 使用刷新令牌获取新的访问令牌
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshTokenRequest'
      responses:
        '200':
          description: 令牌刷新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: 刷新令牌无效
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/profile:
    get:
      tags:
        - 用户管理
      summary: 获取当前用户信息
      description: 获取已登录用户的详细信息
      operationId: getUserProfile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - 用户管理
      summary: 更新用户信息
      description: 更新当前登录用户的个人信息
      operationId: updateUserProfile
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users:
    get:
      tags:
        - 用户管理
      summary: 获取用户列表
      description: 分页获取用户列表（需要管理员权限）
      operationId: getUserList
      security:
        - BearerAuth: []
      parameters:
        - name: page
          in: query
          description: 页码
          required: false
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: pageSize
          in: query
          description: 每页数量
          required: false
          schema:
            type: integer
            default: 10
            minimum: 1
            maximum: 100
        - name: keyword
          in: query
          description: 搜索关键词
          required: false
          schema:
            type: string
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 权限不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /users/{userId}:
    get:
      tags:
        - 用户管理
      summary: 获取指定用户信息
      description: 根据用户ID获取用户详细信息
      operationId: getUserById
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          description: 用户ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags:
        - 用户管理
      summary: 删除用户
      description: 删除指定用户（需要管理员权限）
      operationId: deleteUser
      security:
        - BearerAuth: []
      parameters:
        - name: userId
          in: path
          description: 用户ID
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 删除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          description: 用户不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 权限不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /config/settings:
    get:
      tags:
        - 系统配置
      summary: 获取系统配置
      description: 获取系统全局配置信息
      operationId: getSystemSettings
      security:
        - BearerAuth: []
      responses:
        '200':
          description: 获取成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSettings'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    put:
      tags:
        - 系统配置
      summary: 更新系统配置
      description: 更新系统全局配置（需要管理员权限）
      operationId: updateSystemSettings
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SystemSettings'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SystemSettings'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: 未授权
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: 权限不足
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          description: 用户名
          example: admin
        password:
          type: string
          format: password
          description: 密码
          example: password123

    LoginResponse:
      type: object
      properties:
        code:
          type: integer
          description: 响应代码
          example: 200
        message:
          type: string
          description: 响应消息
          example: 登录成功
        data:
          type: object
          properties:
            token:
              type: string
              description: 访问令牌
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            refreshToken:
              type: string
              description: 刷新令牌
              example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
            expiresIn:
              type: integer
              description: 令牌过期时间（秒）
              example: 3600
            user:
              $ref: '#/components/schemas/UserInfo'

    RegisterRequest:
      type: object
      required:
        - username
        - password
        - email
      properties:
        username:
          type: string
          description: 用户名
          minLength: 3
          maxLength: 20
          example: newuser
        password:
          type: string
          format: password
          description: 密码
          minLength: 6
          example: password123
        email:
          type: string
          format: email
          description: 邮箱地址
          example: user@example.com
        nickname:
          type: string
          description: 昵称
          example: 新用户

    RegisterResponse:
      type: object
      properties:
        code:
          type: integer
          description: 响应代码
          example: 201
        message:
          type: string
          description: 响应消息
          example: 注册成功
        data:
          $ref: '#/components/schemas/UserInfo'

    RefreshTokenRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: 刷新令牌
          example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...

    UserInfo:
      type: object
      properties:
        id:
          type: string
          description: 用户ID
          example: "1234567890"
        username:
          type: string
          description: 用户名
          example: admin
        email:
          type: string
          format: email
          description: 邮箱地址
          example: admin@example.com
        nickname:
          type: string
          description: 昵称
          example: 管理员
        avatar:
          type: string
          format: uri
          description: 头像URL
          example: https://example.com/avatar.jpg
        role:
          type: string
          description: 用户角色
          enum:
            - admin
            - user
            - guest
          example: admin
        createdAt:
          type: string
          format: date-time
          description: 创建时间
          example: "2024-01-01T00:00:00Z"

    UserProfile:
      type: object
      properties:
        code:
          type: integer
          description: 响应代码
          example: 200
        message:
          type: string
          description: 响应消息
          example: 获取成功
        data:
          allOf:
            - $ref: '#/components/schemas/UserInfo'
            - type: object
              properties:
                phone:
                  type: string
                  description: 手机号码
                  example: "13800138000"
                address:
                  type: string
                  description: 地址
                  example: 北京市朝阳区
                bio:
                  type: string
                  description: 个人简介
                  example: 这是个人简介
                lastLoginAt:
                  type: string
                  format: date-time
                  description: 最后登录时间
                  example: "2024-01-01T12:00:00Z"

    UpdateProfileRequest:
      type: object
      properties:
        nickname:
          type: string
          description: 昵称
          example: 新昵称
        email:
          type: string
          format: email
          description: 邮箱地址
          example: newemail@example.com
        avatar:
          type: string
          format: uri
          description: 头像URL
          example: https://example.com/new-avatar.jpg
        phone:
          type: string
          description: 手机号码
          example: "13900139000"
        address:
          type: string
          description: 地址
          example: 上海市浦东新区
        bio:
          type: string
          description: 个人简介
          example: 更新后的个人简介

    UserListResponse:
      type: object
      properties:
        code:
          type: integer
          description: 响应代码
          example: 200
        message:
          type: string
          description: 响应消息
          example: 获取成功
        data:
          type: object
          properties:
            total:
              type: integer
              description: 总记录数
              example: 100
            page:
              type: integer
              description: 当前页码
              example: 1
            pageSize:
              type: integer
              description: 每页数量
              example: 10
            list:
              type: array
              items:
                $ref: '#/components/schemas/UserInfo'

    SystemSettings:
      type: object
      properties:
        code:
          type: integer
          description: 响应代码
          example: 200
        message:
          type: string
          description: 响应消息
          example: 获取成功
        data:
          type: object
          properties:
            siteName:
              type: string
              description: 站点名称
              example: Vue3前端框架
            siteDescription:
              type: string
              description: 站点描述
              example: 基于Vue3的现代化前端框架
            logo:
              type: string
              format: uri
              description: 站点Logo
              example: https://example.com/logo.png
            theme:
              type: string
              description: 主题配置
              enum:
                - light
                - dark
                - auto
              example: light
            language:
              type: string
              description: 默认语言
              example: zh-CN
            enableRegistration:
              type: boolean
              description: 是否允许注册
              example: true
            maintenanceMode:
              type: boolean
              description: 维护模式
              example: false

    SuccessResponse:
      type: object
      properties:
        code:
          type: integer
          description: 响应代码
          example: 200
        message:
          type: string
          description: 响应消息
          example: 操作成功
        data:
          type: object
          nullable: true

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
          description: 错误代码
          example: 400
        message:
          type: string
          description: 错误消息
          example: 请求参数错误
        error:
          type: string
          description: 详细错误信息
          example: username字段不能为空
